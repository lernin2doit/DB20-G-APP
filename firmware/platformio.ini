; PlatformIO configuration for DB20-G ESP32 Bluetooth Interface Board
;
; Build:  pio run
; Flash:  pio run -t upload  (via J5 UART header or USB-UART adapter)
; Monitor: pio device monitor

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32-WROOM-32E has 4MB flash
board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_build.partitions = min_spiffs.csv  ; factory + OTA_0 + OTA_1 + NVS + SPIFFS

; Bluetooth Classic is required for SPP + A2DP
; BLE is optional but useful for future features
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BTDM_CTRL_MODE_BTDM=1
    -DBOARD_HAS_PSRAM=0

lib_deps =
    ; No external libs needed — ESP32 Arduino core has BluetoothSerial built in
